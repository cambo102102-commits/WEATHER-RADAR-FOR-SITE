<!DOCTYPE html>
<html>
<head>
  <title>Live U.S. Radar + Alerts</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    html, body, #map {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #05070a;
    }

    #map { height: 100vh; }

    .title-box {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 999;
      padding: 12px 20px;
      border-radius: 14px;
      background: rgba(0, 0, 0, 0.70);
      color: white;
      font-family: Arial, sans-serif;
      text-align: left;
      box-shadow: 0 0 22px rgba(0, 180, 255, 0.35);
      backdrop-filter: blur(6px);
    }

    .title-box h1 {
      margin: 0;
      font-size: 22px;
      letter-spacing: 1px;
    }

    .title-box p {
      margin: 4px 0 0;
      font-size: 12px;
      color: #cfd8dc;
    }

    .logo-box {
      position: absolute;
      top: 18px;
      right: 18px;
      z-index: 1000;
    }

    .logo-box img {
      height: 80px;
      width: auto;
      filter: drop-shadow(0 0 10px rgba(0,0,0,0.7));
    }

    .control-box {
      position: absolute;
      bottom: 20px;
      left: 20px;
      z-index: 999;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.78);
      color: white;
      font-family: Arial, sans-serif;
      box-shadow: 0 0 18px rgba(0, 180, 255, 0.25);
      min-width: 245px;
      max-width: 285px;
      overflow: hidden;
    }

    .control-header {
      background: rgba(11, 143, 211, 0.95);
      padding: 10px 12px;
      cursor: pointer;
      font-weight: bold;
      user-select: none;
    }

    .control-content {
      padding: 12px;
      display: block;
      max-height: 70vh;
      overflow-y: auto;
    }

    .control-box.collapsed .control-content {
      display: none;
    }

    .control-box button {
      background: #0b8fd3;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 7px 12px;
      cursor: pointer;
      margin-bottom: 8px;
      font-weight: bold;
    }

    .control-box label {
      font-size: 13px;
    }

    .control-box input[type="range"] {
      width: 180px;
    }

    .layer-row {
      margin-top: 6px;
      font-size: 13px;
    }

    #frameText, #alertStatus {
      font-size: 12px;
      margin-top: 6px;
      color: #cfd8dc;
    }

    .legend-box {
      position: absolute;
      bottom: 20px;
      right: 20px;
      z-index: 999;
      padding: 12px;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.78);
      color: white;
      font-family: Arial, sans-serif;
      font-size: 12px;
      box-shadow: 0 0 18px rgba(0, 180, 255, 0.25);
    }

    .legend-item {
      margin: 5px 0;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .swatch {
      width: 18px;
      height: 10px;
      border-radius: 3px;
      display: inline-block;
    }

    .leaflet-control-attribution {
      font-size: 10px;
      background: rgba(0, 0, 0, 0.55) !important;
      color: #ddd !important;
    }

    .leaflet-control-attribution a {
      color: #8fd3ff !important;
    }

    @media (max-width: 700px) {
      .title-box {
        top: 12px;
        left: 12px;
        padding: 8px 12px;
        max-width: 210px;
      }

      .title-box h1 { font-size: 15px; }
      .title-box p { font-size: 10px; }

      .logo-box {
        top: 10px;
        right: 10px;
      }

      .logo-box img { height: 45px; }

      .control-box {
        left: 10px;
        bottom: 10px;
        min-width: 200px;
        max-width: 230px;
      }

      .control-box input[type="range"] {
        width: 145px;
      }

      .legend-box {
        right: 10px;
        bottom: 10px;
        font-size: 10px;
        padding: 8px;
        max-width: 145px;
      }

      .swatch {
        width: 14px;
        height: 8px;
      }
    }
  </style>
</head>

<body>

<div id="map"></div>

<div class="logo-box">
  <img src="logo.png" alt="Weather Logo">
</div>

<div class="title-box">
  <h1>LIVE U.S. RADAR</h1>
  <p>NEXRAD Loop + NWS Alerts + WPC/SPC Layers</p>
</div>

<div class="control-box collapsed" id="controlBox">
  <div class="control-header" id="controlHeader">☰ Radar Options</div>

  <div class="control-content">
    <button id="playPauseBtn">Pause</button><br>

    <label for="opacitySlider">Radar Opacity</label><br>
    <input id="opacitySlider" type="range" min="0" max="1" step="0.05" value="0.70">

    <br><br>

    <label for="speedSlider">Loop Speed</label><br>
    <input id="speedSlider" type="range" min="300" max="2000" step="100" value="800">

    <div id="frameText">Frame 1 of 7</div>

    <hr style="border-color: rgba(255,255,255,0.2);">

    <div class="layer-row">
      <input type="checkbox" id="torWarnToggle" checked>
      <label for="torWarnToggle">Tornado Warnings</label>
    </div>

    <div class="layer-row">
      <input type="checkbox" id="svrWarnToggle" checked>
      <label for="svrWarnToggle">Severe T-Storm Warnings</label>
    </div>

    <div class="layer-row">
      <input type="checkbox" id="ffWarnToggle" checked>
      <label for="ffWarnToggle">Flash Flood Warnings</label>
    </div>

    <div class="layer-row">
      <input type="checkbox" id="watchToggle" checked>
      <label for="watchToggle">Tornado / Severe Watches</label>
    </div>

    <hr style="border-color: rgba(255,255,255,0.2);">

    <div class="layer-row">
      <input type="checkbox" id="surfaceToggle">
      <label for="surfaceToggle">WPC Surface Analysis</label>
    </div>

    <div class="layer-row">
      <input type="checkbox" id="spcDay1Toggle">
      <label for="spcDay1Toggle">SPC Day 1 Outlook</label>
    </div>

    <div class="layer-row">
      <input type="checkbox" id="spcDay2Toggle">
      <label for="spcDay2Toggle">SPC Day 2 Outlook</label>
    </div>

    <div class="layer-row">
      <input type="checkbox" id="spcDay3Toggle">
      <label for="spcDay3Toggle">SPC Day 3 Outlook</label>
    </div>

    <div id="alertStatus">Loading alerts...</div>
  </div>
</div>

<div class="legend-box">
  <strong>Alert Legend</strong>
  <div class="legend-item"><span class="swatch" style="background:#ff0033;"></span>Tornado Warning</div>
  <div class="legend-item"><span class="swatch" style="background:#ffd400;"></span>Severe T-Storm Warning</div>
  <div class="legend-item"><span class="swatch" style="background:#00ff66;"></span>Flash Flood Warning</div>
  <div class="legend-item"><span class="swatch" style="background:#ff66ff;"></span>Tornado Watch</div>
  <div class="legend-item"><span class="swatch" style="background:#ffaa00;"></span>Severe T-Storm Watch</div>
  <div class="legend-item"><span class="swatch" style="background:#ffffff;"></span>WPC / SPC Layers</div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/esri-leaflet/dist/esri-leaflet.js"></script>

<script>
  document.getElementById('controlHeader').addEventListener('click', function () {
    document.getElementById('controlBox').classList.toggle('collapsed');
  });

  const map = L.map('map', {
    zoomControl: true,
    scrollWheelZoom: true
  }).setView([39.5, -98.35], 4);

  L.tileLayer(
    'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
    {
      maxZoom: 10,
      attribution: '&copy; OpenStreetMap &copy; CARTO'
    }
  ).addTo(map);

  const frameNames = [
    'nexrad-n0q-900913-m30m',
    'nexrad-n0q-900913-m25m',
    'nexrad-n0q-900913-m20m',
    'nexrad-n0q-900913-m15m',
    'nexrad-n0q-900913-m10m',
    'nexrad-n0q-900913-m05m',
    'nexrad-n0q-900913'
  ];

  const radarLayers = frameNames.map(name => {
    return L.tileLayer(
      `https://mesonet.agron.iastate.edu/cache/tile.py/1.0.0/${name}/{z}/{x}/{y}.png`,
      {
        opacity: 0,
        maxZoom: 10,
        attribution: 'NEXRAD Reflectivity: Iowa State IEM / NWS'
      }
    ).addTo(map);
  });

  let currentFrame = 0;
  let playing = true;
  let intervalSpeed = 800;
  let loopTimer;

  const opacitySlider = document.getElementById('opacitySlider');
  const speedSlider = document.getElementById('speedSlider');
  const playPauseBtn = document.getElementById('playPauseBtn');
  const frameText = document.getElementById('frameText');

  function showFrame(index) {
    radarLayers.forEach((layer, i) => {
      layer.setOpacity(i === index ? opacitySlider.value : 0);
    });
    frameText.textContent = `Frame ${index + 1} of ${radarLayers.length}`;
  }

  function nextFrame() {
    currentFrame = (currentFrame + 1) % radarLayers.length;
    showFrame(currentFrame);
  }

  function startLoop() {
    clearInterval(loopTimer);
    loopTimer = setInterval(nextFrame, intervalSpeed);
  }

  opacitySlider.addEventListener('input', () => showFrame(currentFrame));

  speedSlider.addEventListener('input', function () {
    intervalSpeed = Number(this.value);
    if (playing) startLoop();
  });

  playPauseBtn.addEventListener('click', function () {
    playing = !playing;

    if (playing) {
      playPauseBtn.textContent = 'Pause';
      startLoop();
    } else {
      playPauseBtn.textContent = 'Play';
      clearInterval(loopTimer);
    }
  });

  showFrame(currentFrame);
  startLoop();

  const tornadoWarnings = L.layerGroup().addTo(map);
  const severeWarnings = L.layerGroup().addTo(map);
  const flashFloodWarnings = L.layerGroup().addTo(map);
  const watches = L.layerGroup().addTo(map);

  const wpcSurfaceLayer = L.imageOverlay(
    'https://www.wpc.ncep.noaa.gov/sfc/usfntsfcwbg.gif?t=' + Date.now(),
    [[24.0, -125.0], [50.0, -66.0]],
    {
      opacity: 0.72,
      attribution: 'WPC Surface Analysis'
    }
  );

  const spcServiceUrl = 'https://mapservices.weather.noaa.gov/vector/rest/services/outlooks/SPC_wx_outlks/MapServer';

  const spcDay1Layer = L.esri.dynamicMapLayer({
    url: spcServiceUrl,
    layers: [1],
    opacity: 0.58,
    attribution: 'NOAA SPC Day 1 Outlook'
  });

  const spcDay2Layer = L.esri.dynamicMapLayer({
    url: spcServiceUrl,
    layers: [9],
    opacity: 0.58,
    attribution: 'NOAA SPC Day 2 Outlook'
  });

  const spcDay3Layer = L.esri.dynamicMapLayer({
    url: spcServiceUrl,
    layers: [17],
    opacity: 0.58,
    attribution: 'NOAA SPC Day 3 Outlook'
  });

  function getAlertStyle(eventName) {
    if (eventName === 'Tornado Warning') {
      return { color: '#ff0033', weight: 3, fillColor: '#ff0033', fillOpacity: 0.15 };
    }
    if (eventName === 'Severe Thunderstorm Warning') {
      return { color: '#ffd400', weight: 3, fillColor: '#ffd400', fillOpacity: 0.13 };
    }
    if (eventName === 'Flash Flood Warning') {
      return { color: '#00ff66', weight: 3, fillColor: '#00ff66', fillOpacity: 0.13 };
    }
    if (eventName === 'Tornado Watch') {
      return { color: '#ff66ff', weight: 2, fillColor: '#ff66ff', fillOpacity: 0.08 };
    }
    if (eventName === 'Severe Thunderstorm Watch') {
      return { color: '#ffaa00', weight: 2, fillColor: '#ffaa00', fillOpacity: 0.08 };
    }
    return { color: '#ffffff', weight: 2, fillColor: '#ffffff', fillOpacity: 0.08 };
  }

  function getLayerForAlert(eventName) {
    if (eventName === 'Tornado Warning') return tornadoWarnings;
    if (eventName === 'Severe Thunderstorm Warning') return severeWarnings;
    if (eventName === 'Flash Flood Warning') return flashFloodWarnings;
    if (eventName === 'Tornado Watch') return watches;
    if (eventName === 'Severe Thunderstorm Watch') return watches;
    return null;
  }

  function formatTime(timeString) {
    if (!timeString) return 'N/A';
    return new Date(timeString).toLocaleString();
  }

  async function loadAlerts() {
    const alertStatus = document.getElementById('alertStatus');
    alertStatus.textContent = 'Loading alerts...';

    tornadoWarnings.clearLayers();
    severeWarnings.clearLayers();
    flashFloodWarnings.clearLayers();
    watches.clearLayers();

    const wantedAlerts = [
      'Tornado Warning',
      'Severe Thunderstorm Warning',
      'Flash Flood Warning',
      'Tornado Watch',
      'Severe Thunderstorm Watch'
    ];

    try {
      const response = await fetch('https://api.weather.gov/alerts/active?status=actual&message_type=alert');
      if (!response.ok) throw new Error('NWS alerts failed to load');

      const data = await response.json();
      let count = 0;

      data.features.forEach(feature => {
        const eventName = feature.properties.event;
        if (!wantedAlerts.includes(eventName)) return;
        if (!feature.geometry) return;

        const targetLayer = getLayerForAlert(eventName);
        if (!targetLayer) return;

        const polygon = L.geoJSON(feature, {
          style: getAlertStyle(eventName),
          onEachFeature: function (feature, layer) {
            const p = feature.properties;
            layer.bindPopup(`
              <strong>${p.event}</strong><br>
              <b>Area:</b> ${p.areaDesc || 'N/A'}<br>
              <b>Severity:</b> ${p.severity || 'N/A'}<br>
              <b>Certainty:</b> ${p.certainty || 'N/A'}<br>
              <b>Effective:</b> ${formatTime(p.effective)}<br>
              <b>Expires:</b> ${formatTime(p.expires)}<br><br>
              ${p.headline || ''}
            `);
          }
        });

        polygon.addTo(targetLayer);
        count++;
      });

      alertStatus.textContent = `${count} active alert polygons loaded`;
    } catch (error) {
      console.error(error);
      alertStatus.textContent = 'Alerts failed to load';
    }
  }

  function setupToggle(toggleId, layerGroup) {
    const checkbox = document.getElementById(toggleId);
    checkbox.addEventListener('change', function () {
      if (this.checked) {
        map.addLayer(layerGroup);
      } else {
        map.removeLayer(layerGroup);
      }
    });
  }

  setupToggle('torWarnToggle', tornadoWarnings);
  setupToggle('svrWarnToggle', severeWarnings);
  setupToggle('ffWarnToggle', flashFloodWarnings);
  setupToggle('watchToggle', watches);
  setupToggle('surfaceToggle', wpcSurfaceLayer);
  setupToggle('spcDay1Toggle', spcDay1Layer);
  setupToggle('spcDay2Toggle', spcDay2Layer);
  setupToggle('spcDay3Toggle', spcDay3Layer);

  loadAlerts();
  setInterval(loadAlerts, 120000);

  setInterval(() => {
    location.reload();
  }, 600000);
</script>

</body>
</html>
