<!DOCTYPE html>
<html>
<head>
  <title>Live U.S. Radar Loop</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    html, body, #map {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #05070a;
    }

    #map {
      height: 100vh;
    }

    .title-box {
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 999;
      padding: 12px 22px;
      border-radius: 14px;
      background: rgba(0, 0, 0, 0.65);
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      box-shadow: 0 0 22px rgba(0, 180, 255, 0.35);
      backdrop-filter: blur(6px);
    }

    .title-box h1 {
      margin: 0;
      font-size: 22px;
      letter-spacing: 1px;
    }

    .title-box p {
      margin: 4px 0 0;
      font-size: 12px;
      color: #cfd8dc;
    }

    .control-box {
      position: absolute;
      bottom: 20px;
      left: 20px;
      z-index: 999;
      padding: 12px;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.75);
      color: white;
      font-family: Arial, sans-serif;
      box-shadow: 0 0 18px rgba(0, 180, 255, 0.25);
      min-width: 210px;
    }

    .control-box button {
      background: #0b8fd3;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 7px 12px;
      cursor: pointer;
      margin-bottom: 8px;
      font-weight: bold;
    }

    .control-box button:hover {
      background: #15a9f5;
    }

    .control-box label {
      font-size: 13px;
    }

    .control-box input {
      width: 170px;
    }

    #frameText {
      font-size: 12px;
      margin-top: 6px;
      color: #cfd8dc;
    }

    .leaflet-control-attribution {
      font-size: 10px;
      background: rgba(0, 0, 0, 0.55) !important;
      color: #ddd !important;
    }

    .leaflet-control-attribution a {
      color: #8fd3ff !important;
    }
  </style>
</head>

<body>

<div id="map"></div>

<div class="title-box">
  <h1>LIVE U.S. RADAR</h1>
  <p>7-Frame NEXRAD Reflectivity Loop</p>
</div>

<div class="control-box">
  <button id="playPauseBtn">Pause</button><br>

  <label for="opacitySlider">Radar Opacity</label><br>
  <input id="opacitySlider" type="range" min="0" max="1" step="0.05" value="0.70">

  <br><br>

  <label for="speedSlider">Loop Speed</label><br>
  <input id="speedSlider" type="range" min="300" max="2000" step="100" value="800">

  <div id="frameText">Frame 1 of 7</div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  const map = L.map('map', {
    zoomControl: true,
    scrollWheelZoom: true
  }).setView([39.5, -98.35], 4);

  L.tileLayer(
    'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
    {
      maxZoom: 10,
      attribution: '&copy; OpenStreetMap &copy; CARTO'
    }
  ).addTo(map);

  // 7 frames: newest, 5 min ago, 10 min ago, etc.
  const frameNames = [
    'nexrad-n0q-900913-m30m',
    'nexrad-n0q-900913-m25m',
    'nexrad-n0q-900913-m20m',
    'nexrad-n0q-900913-m15m',
    'nexrad-n0q-900913-m10m',
    'nexrad-n0q-900913-m05m',
    'nexrad-n0q-900913'
  ];

  const radarLayers = frameNames.map(name => {
    return L.tileLayer(
      `https://mesonet.agron.iastate.edu/cache/tile.py/1.0.0/${name}/{z}/{x}/{y}.png`,
      {
        opacity: 0,
        maxZoom: 10,
        attribution: 'NEXRAD Reflectivity: Iowa State IEM / NWS'
      }
    ).addTo(map);
  });

  let currentFrame = 0;
  let playing = true;
  let intervalSpeed = 800;
  let loopTimer;

  const opacitySlider = document.getElementById('opacitySlider');
  const speedSlider = document.getElementById('speedSlider');
  const playPauseBtn = document.getElementById('playPauseBtn');
  const frameText = document.getElementById('frameText');

  function showFrame(index) {
    radarLayers.forEach((layer, i) => {
      layer.setOpacity(i === index ? opacitySlider.value : 0);
    });

    frameText.textContent = `Frame ${index + 1} of ${radarLayers.length}`;
  }

  function nextFrame() {
    currentFrame = (currentFrame + 1) % radarLayers.length;
    showFrame(currentFrame);
  }

  function startLoop() {
    clearInterval(loopTimer);
    loopTimer = setInterval(nextFrame, intervalSpeed);
  }

  opacitySlider.addEventListener('input', function () {
    showFrame(currentFrame);
  });

  speedSlider.addEventListener('input', function () {
    intervalSpeed = Number(this.value);

    if (playing) {
      startLoop();
    }
  });

  playPauseBtn.addEventListener('click', function () {
    playing = !playing;

    if (playing) {
      playPauseBtn.textContent = 'Pause';
      startLoop();
    } else {
      playPauseBtn.textContent = 'Play';
      clearInterval(loopTimer);
    }
  });

  showFrame(currentFrame);
  startLoop();

  // Reload page every 10 minutes so the newest radar frames update
  setInterval(() => {
    location.reload();
  }, 600000);
</script>

</body>
</html>
